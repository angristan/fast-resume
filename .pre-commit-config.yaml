repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt -- --check
        language: system
        pass_filenames: false
        always_run: true

      - id: cargo-check
        name: cargo check
        entry: cargo check --all-targets --locked
        language: system
        pass_filenames: false
        always_run: true

      - id: cargo-test
        name: cargo test
        entry: cargo test --locked
        language: system
        pass_filenames: false
        always_run: true
