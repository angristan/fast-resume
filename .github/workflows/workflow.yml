name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  commitlint:
    name: Commit Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - run: npm install -D @commitlint/cli @commitlint/config-conventional
      - name: Validate current commit (last commit) with commitlint
        if: github.event_name == 'push'
        run: npx commitlint --last --verbose
      - name: Validate PR commits with commitlint
        if: github.event_name == 'pull_request'
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Cache Cargo dependencies and build output
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ runner.arch }}-debug-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ runner.arch }}-debug-
      - name: Check formatting
        run: cargo fmt --check
      - name: Run tests
        run: cargo test --locked
      - name: Build
        run: cargo build --locked

  python-wheel:
    name: Python wheel (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.runner }}
    env:
      SCCACHE_GHA_CACHE_FROM: ${{ matrix.platform.target }}
      SCCACHE_GHA_CACHE_TO: ${{ matrix.platform.target }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS (Apple Silicon)
            runner: macos-26
            target: aarch64-apple-darwin
          - name: macOS (Intel)
            runner: macos-26-intel
            target: x86_64-apple-darwin
          - name: Linux (x86_64)
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: '2014'
          - name: Linux (ARM64)
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: '2014'
          - name: Windows (x86_64)
            runner: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build Linux wheel
        if: runner.os == 'Linux'
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: v1.14.1
          sccache: true
          target: ${{ matrix.platform.target }}
          manylinux: ${{ matrix.platform.manylinux }}
          args: --release --locked --out dist --compatibility pypi

      - name: Build macOS wheel
        if: runner.os == 'macOS'
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: v1.14.1
          sccache: true
          target: ${{ matrix.platform.target }}
          args: --release --locked --out dist --compatibility pypi

      - name: Build Windows wheel
        if: runner.os == 'Windows'
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: v1.14.1
          sccache: true
          target: ${{ matrix.platform.target }}
          args: --release --locked --out dist --compatibility pypi

      - name: Verify wheel installs and runs (Unix)
        if: runner.os != 'Windows'
        run: |
          python -m venv .wheel-test
          .wheel-test/bin/pip install dist/*.whl
          .wheel-test/bin/fr --version
          .wheel-test/bin/fr --help
          .wheel-test/bin/fast-resume --version

      - name: Verify wheel installs and runs (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m venv .wheel-test
          $wheel = Get-ChildItem dist/*.whl | Select-Object -First 1
          & .\.wheel-test\Scripts\python.exe -m pip install $wheel.FullName
          & .\.wheel-test\Scripts\fr.exe --version
          & .\.wheel-test\Scripts\fr.exe --help
          & .\.wheel-test\Scripts\fast-resume.cmd --version

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [commitlint, rust, python-wheel]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    # Prevent concurrent releases from racing (would cause "tag already exists" errors)
    concurrency:
      group: release
      cancel-in-progress: false
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    outputs:
      new_release_version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: Get latest tag before release
        id: before
        run: echo "tag=$(git describe --tags --abbrev=0 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"
      - name: Install dependencies
        run: npm install -D semantic-release @semantic-release/changelog @semantic-release/git @semantic-release/exec
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
      - name: Check if a new release was created
        id: check
        run: |
          git fetch --tags
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo '')
          if [ "$LATEST_TAG" != "${{ steps.before.outputs.tag }}" ] && [ -n "$LATEST_TAG" ]; then
            echo "version=${LATEST_TAG#v}" >> "$GITHUB_OUTPUT"
          fi

  build-binaries:
    name: Build binary (${{ matrix.platform.name }})
    needs: [release]
    if: needs.release.outputs.new_release_version != ''
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS (Apple Silicon)
            runner: macos-26
            archive: macos-arm64
          - name: macOS (Intel)
            runner: macos-26-intel
            archive: macos-x86_64
          - name: Linux (x86_64)
            runner: ubuntu-latest
            archive: linux-x86_64
          - name: Linux (ARM64)
            runner: ubuntu-24.04-arm
            archive: linux-arm64
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: v${{ needs.release.outputs.new_release_version }}
      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies and release build output
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ runner.arch }}-release-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ runner.arch }}-release-

      - name: Build binary
        run: cargo build --release --locked

      - name: Package binary
        env:
          VERSION: ${{ needs.release.outputs.new_release_version }}
          PLATFORM: ${{ matrix.platform.archive }}
        run: |
          mkdir -p dist/fr
          cp target/release/fr dist/fr/fr
          chmod +x dist/fr/fr
          ln -sf fr dist/fr/fast-resume
          tar -czf "dist/fast-resume-${VERSION}-${PLATFORM}.tar.gz" -C dist fr

      - name: Verify binary runs
        run: |
          ./dist/fr/fr --version
          ./dist/fr/fr --help

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ needs.release.outputs.new_release_version }}" \
            dist/fast-resume-*.tar.gz \
            --clobber

  build-python-wheels:
    name: Build PyPI wheel (${{ matrix.platform.name }})
    needs: [release]
    if: needs.release.outputs.new_release_version != ''
    runs-on: ${{ matrix.platform.runner }}
    env:
      SCCACHE_GHA_CACHE_FROM: ${{ matrix.platform.target }}
      SCCACHE_GHA_CACHE_TO: ${{ matrix.platform.target }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS (Apple Silicon)
            runner: macos-26
            target: aarch64-apple-darwin
            artifact: python-wheel-macos-arm64
          - name: macOS (Intel)
            runner: macos-26-intel
            target: x86_64-apple-darwin
            artifact: python-wheel-macos-x86_64
          - name: Linux (x86_64)
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: '2014'
            artifact: python-wheel-linux-x86_64
          - name: Linux (ARM64)
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: '2014'
            artifact: python-wheel-linux-arm64
          - name: Windows (x86_64)
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: python-wheel-windows-x86_64
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          ref: v${{ needs.release.outputs.new_release_version }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build Linux wheel
        if: runner.os == 'Linux'
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: v1.14.1
          sccache: true
          target: ${{ matrix.platform.target }}
          manylinux: ${{ matrix.platform.manylinux }}
          args: --release --locked --out dist --compatibility pypi

      - name: Build macOS wheel
        if: runner.os == 'macOS'
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: v1.14.1
          sccache: true
          target: ${{ matrix.platform.target }}
          args: --release --locked --out dist --compatibility pypi

      - name: Build Windows wheel
        if: runner.os == 'Windows'
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: v1.14.1
          sccache: true
          target: ${{ matrix.platform.target }}
          args: --release --locked --out dist --compatibility pypi

      - name: Verify wheel installs and runs (Unix)
        if: runner.os != 'Windows'
        run: |
          python -m venv .wheel-test
          .wheel-test/bin/pip install dist/*.whl
          .wheel-test/bin/fr --version
          .wheel-test/bin/fr --help
          .wheel-test/bin/fast-resume --version

      - name: Verify wheel installs and runs (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m venv .wheel-test
          $wheel = Get-ChildItem dist/*.whl | Select-Object -First 1
          & .\.wheel-test\Scripts\python.exe -m pip install $wheel.FullName
          & .\.wheel-test\Scripts\fr.exe --version
          & .\.wheel-test\Scripts\fr.exe --help
          & .\.wheel-test\Scripts\fast-resume.cmd --version

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platform.artifact }}
          path: dist/*.whl
          if-no-files-found: error

  publish-pypi:
    name: Publish PyPI wheels
    needs: [release, build-python-wheels]
    if: needs.release.outputs.new_release_version != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          pattern: python-wheel-*
          path: dist
          merge-multiple: true
      - uses: astral-sh/setup-uv@v8.3.2
      - name: Publish wheels
        run: uv publish dist/*.whl

  update-homebrew:
    name: Update Homebrew formula
    needs: [release, build-binaries]
    if: needs.release.outputs.new_release_version != ''
    runs-on: ubuntu-latest
    steps:
      - name: Notify homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          gh api repos/angristan/homebrew-tap/dispatches \
            -f event_type=update-formula \
            -f "client_payload[formula]=fast-resume" \
            -f "client_payload[version]=${{ needs.release.outputs.new_release_version }}"
